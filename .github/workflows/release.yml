name: Build and Release DMG

on:
  push:
    tags:
      - 'dmg-*'
  workflow_dispatch:

jobs:
  build:
    name: Build TermNotch
    runs-on: macos-latest

    steps:
      - name: 📥 Récupération du code
        uses: actions/checkout@v4

      - name: 🔨 Compilation (Apple Silicon Uniquement)
        run: |
          echo "1. Compilation exclusive pour Apple Silicon (arm64)..."
          swiftc *.swift -o TermNotch -target arm64-apple-macosx11.0
          
          echo "2. Création de la structure .app stricte..."
          mkdir -p TermNotch.app/Contents/MacOS
          mkdir -p TermNotch.app/Contents/Resources
          mv TermNotch TermNotch.app/Contents/MacOS/
          
          echo "3. Ajout du fichier PkgInfo (Requis par Gatekeeper)..."
          echo -n "APPL????" > TermNotch.app/Contents/PkgInfo
          
          echo "4. Création du Info.plist complet..."
          cat > TermNotch.app/Contents/Info.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>TermNotch</string>
              <key>CFBundleIdentifier</key>
              <string>com.tonnom.TermNotch</string>
              <key>CFBundleName</key>
              <string>TermNotch</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>${{ github.ref_name }}</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <!-- Apple Silicon nécessite au minimum macOS 11.0 -->
              <key>LSMinimumSystemVersion</key>
              <string>11.0</string>
              <key>LSUIElement</key>
              <true/>
          </dict>
          </plist>
          EOF
          
          echo "5. Signature ad-hoc propre..."
          codesign --force --deep --sign - TermNotch.app

      - name: 📦 Création du fichier DMG (Avec raccourci Applications)
        run: |
          echo "Préparation du dossier pour le DMG..."
          mkdir -p dmg_staging
          mv TermNotch.app dmg_staging/
          
          ln -s /Applications dmg_staging/Applications
          
          echo "Création du DMG..."
          hdiutil create -volname "TermNotch" -srcfolder dmg_staging -ov -format UDZO TermNotch.dmg

      - name: 🚀 Publication de la Release
        uses: softprops/action-gh-release@v2
        with:
          files: TermNotch.dmg
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}